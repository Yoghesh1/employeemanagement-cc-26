# =============================================
# APPLICATION PROPERTIES
# =============================================

# Server
server.port=8080

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/hrms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sa123SA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT CONFIGURATION
# =============================================
app.jwt.secret=mySecretKeyForHRMSApplicationThatIsLongEnoughToBeSecure12345678
app.jwt.expiration=86400000

# =============================================
# LOGGING
# =============================================
logging.level.com.hrms=DEBUG
logging.level.org.springframework.security=INFO
