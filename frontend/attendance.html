<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><h1>HRMS</h1><span>Management System</span></div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
        <button class="btn btn-outline btn-block" id="logout-btn" style="color:#fff;border-color:rgba(255,255,255,0.3);">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar"><button id="menu-toggle">☰</button><h2 id="page-title">Attendance</h2></header>
      <div class="page-content">
        <div id="alert-container"></div>

        <div class="card" id="mark-attendance-section">
          <div class="card-header"><h3>Mark Attendance</h3></div>
          <form id="attendance-form">
            <div class="form-row">
              <div class="form-group">
                <label>Employee *</label>
                <select id="att-employeeId" required></select>
              </div>
              <div class="form-group">
                <label>Date *</label>
                <input type="date" id="att-date" required>
              </div>
              <div class="form-group">
                <label>Status *</label>
                <select id="att-status" required>
                  <option value="PRESENT">PRESENT</option>
                  <option value="ABSENT">ABSENT</option>
                  <option value="HALF_DAY">HALF_DAY</option>
                  <option value="ON_LEAVE">ON_LEAVE</option>
                  <option value="HOLIDAY">HOLIDAY</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Check In</label><input type="time" id="att-checkIn"></div>
              <div class="form-group"><label>Check Out</label><input type="time" id="att-checkOut"></div>
              <div class="form-group"><label>Remarks</label><input type="text" id="att-remarks"></div>
            </div>
            <button type="submit" class="btn btn-primary">Mark Attendance</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><h3>Attendance Records</h3></div>
          <div class="toolbar">
            <select id="filter-employeeId"><option value="">All (select employee)</option></select>
            <input type="date" id="filter-date">
            <button class="btn btn-primary" id="load-attendance-btn">Load by Employee</button>
            <button class="btn btn-outline" id="load-by-date-btn">Load by Date</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th>ID</th><th>Employee</th><th>Date</th><th>Check In</th><th>Check Out</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="attendance-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="js/config.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/attendance.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Utils.loadEmployeesForSelect('filter-employeeId');
    });
  </script>
</body>
</html>
