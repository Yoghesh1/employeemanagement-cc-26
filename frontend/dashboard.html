<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><h1>HRMS</h1><span>Management System</span></div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
        <button class="btn btn-outline btn-block" id="logout-btn" style="color:#fff;border-color:rgba(255,255,255,0.3);">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <button id="menu-toggle" aria-label="Menu">☰</button>
        <h2 id="page-title">Dashboard</h2>
      </header>
      <div class="page-content">
        <div id="alert-container"></div>
        <div class="welcome-card">
          <div id="welcome-message">Welcome!</div>
        </div>
        <div class="card hidden" id="employee-profile-card" data-role="EMPLOYEE">
          <div class="card-header"><h3>My Profile</h3></div>
          <div id="employee-profile-summary" class="text-muted">Loading profile...</div>
          <a href="employees.html" class="btn btn-outline" style="margin-top:12px;">View full profile</a>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon blue">👥</div><div class="stat-info"><h3 id="stat-employees">-</h3><p>Employees</p></div></div>
          <div class="stat-card"><div class="stat-icon yellow">🏖</div><div class="stat-info"><h3 id="stat-pending-leave">-</h3><p>Pending Leave</p></div></div>
          <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h3 id="stat-tasks">-</h3><p>Active Tasks</p></div></div>
          <div class="stat-card"><div class="stat-icon purple">💰</div><div class="stat-info"><h3 id="stat-payroll">-</h3><p>Payroll Items</p></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Quick Links</h3></div>
          <div class="quick-links">
            <a href="employees.html" class="quick-link"><span>👥</span>Employees</a>
            <a href="attendance.html" class="quick-link"><span>📅</span>Attendance</a>
            <a href="leave.html" class="quick-link"><span>🏖</span>Leave</a>
            <a href="payroll.html" class="quick-link" data-role="ADMIN,HR,EMPLOYEE"><span>💰</span>Payroll</a>
            <a href="tasks.html" class="quick-link"><span>✅</span>Tasks</a>
            <a href="reports.html" class="quick-link" data-role="ADMIN,HR,MANAGER"><span>📈</span>Reports</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="js/config.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
