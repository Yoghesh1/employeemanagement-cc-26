<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container" style="max-width:480px;">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>HRMS</h1>
        <p>Create your account</p>
      </div>
      <h2>Register</h2>
      <div id="alert-container"></div>
      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Min 3 characters" required minlength="3">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" class="form-control" required>
            <option value="ADMIN">Admin</option>
            <option value="HR">HR</option>
            <option value="MANAGER">Manager</option>
            <option value="EMPLOYEE" selected>Employee</option>
          </select>
        </div>

        <div id="employee-profile-section">
          <h4 style="margin:16px 0 8px;font-size:14px;color:#64748b;">Employee Profile</h4>
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" class="form-control">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" class="form-control">
          </div>
          <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="text" id="phone" class="form-control">
          </div>
          <div class="form-group">
            <label for="department">Department *</label>
            <input type="text" id="department" class="form-control" placeholder="e.g. Engineering">
          </div>
          <div class="form-group">
            <label for="designation">Designation *</label>
            <input type="text" id="designation" class="form-control" placeholder="e.g. Software Engineer">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>

  <script src="js/config.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const roleSelect = document.getElementById('role');
    const profileSection = document.getElementById('employee-profile-section');
    const profileFields = ['firstName', 'lastName', 'phone', 'department', 'designation'];

    function toggleEmployeeFields() {
      const isEmployee = roleSelect.value === 'EMPLOYEE';
      profileSection.classList.toggle('hidden', !isEmployee);
      profileFields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.required = isEmployee;
      });
    }

    roleSelect.addEventListener('change', toggleEmployeeFields);
    toggleEmployeeFields();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errors = Utils.validateRequired(e.target, [
        { id: 'username', label: 'Username' },
        { id: 'email', label: 'Email', type: 'email' },
        { id: 'password', label: 'Password' }
      ]);

      const payload = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: roleSelect.value
      };

      if (roleSelect.value === 'EMPLOYEE') {
        profileFields.forEach(id => {
          const el = document.getElementById(id);
          if (!el?.value?.trim()) errors.push(`${id} is required for employee registration`);
        });
        payload.firstName = document.getElementById('firstName').value.trim();
        payload.lastName = document.getElementById('lastName').value.trim();
        payload.phone = document.getElementById('phone').value.trim();
        payload.department = document.getElementById('department').value.trim();
        payload.designation = document.getElementById('designation').value.trim();
      }

      if (errors.length) {
        Utils.showAlert(errors.join('. '), 'error');
        return;
      }

      Utils.setLoading(true);
      try {
        const res = await AuthService.signup(payload);
        Utils.showAlert(res.message || 'Registration successful! You can now login.', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        Utils.showAlert(err.message, 'error');
      } finally {
        Utils.setLoading(false);
      }
    });
  </script>
</body>
</html>
