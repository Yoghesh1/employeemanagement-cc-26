<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container" style="max-width:480px;">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>HRMS</h1>
        <p>Staff account registration</p>
      </div>
      <h2>Register</h2>
      <div id="alert-container"></div>

      <div class="auth-hint" style="margin-bottom:16px;">
        <strong>Employees:</strong> You cannot sign up here. Admin or HR will create your account and give you username/password. Then use <a href="login.html">Login</a>.
      </div>

      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Min 3 characters" required minlength="3">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" class="form-control" required>
            <option value="ADMIN">Admin</option>
            <option value="HR">HR</option>
            <option value="MANAGER" selected>Manager</option>
          </select>
          <small class="text-muted" style="display:block;margin-top:6px;">Admin/HR/Manager only. Employee accounts are created from the Employees page.</small>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>

  <script src="js/config.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errors = Utils.validateRequired(e.target, [
        { id: 'username', label: 'Username' },
        { id: 'email', label: 'Email', type: 'email' },
        { id: 'password', label: 'Password' },
        { id: 'role', label: 'Role' }
      ]);

      const payload = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };

      if (errors.length) {
        Utils.showAlert(errors.join('. '), 'error');
        return;
      }

      Utils.setLoading(true);
      try {
        const res = await AuthService.signup(payload);
        Utils.showAlert(res.message || 'Registration successful! You can now login.', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        Utils.showAlert(err.message, 'error');
      } finally {
        Utils.setLoading(false);
      }
    });
  </script>
</body>
</html>
