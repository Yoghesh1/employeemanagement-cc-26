<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - HRMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><h1>HRMS</h1><span>Management System</span></div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
        <button class="btn btn-outline btn-block" id="logout-btn" style="color:#fff;border-color:rgba(255,255,255,0.3);">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar"><button id="menu-toggle">☰</button><h2 id="page-title">Tasks</h2></header>
      <div class="page-content">
        <div id="alert-container"></div>

        <div class="card" id="assign-task-section">
          <div class="card-header"><h3>Assign Task</h3></div>
          <form id="task-form">
            <div class="form-row">
              <div class="form-group">
                <label>Assign To *</label>
                <select id="task-employeeId" required></select>
              </div>
              <div class="form-group">
                <label>Title *</label>
                <input type="text" id="task-title" required>
              </div>
              <div class="form-group">
                <label>Priority</label>
                <select id="task-priority">
                  <option value="LOW">LOW</option>
                  <option value="MEDIUM" selected>MEDIUM</option>
                  <option value="HIGH">HIGH</option>
                  <option value="CRITICAL">CRITICAL</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Due Date</label><input type="date" id="task-dueDate"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="task-description" rows="3"></textarea></div>
            <button type="submit" class="btn btn-primary">Assign Task</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><h3>Tasks</h3></div>
          <div class="toolbar">
            <select id="filter-employeeId"><option value="">Select employee</option></select>
            <button class="btn btn-primary" id="load-tasks-btn">Load All</button>
            <button class="btn btn-outline" id="load-by-employee-btn">By Employee</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th>ID</th><th>Title</th><th>Assigned To</th><th>By</th><th>Due</th><th>Priority</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody id="tasks-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="js/config.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/tasks.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Utils.loadEmployeesForSelect('filter-employeeId');
    });
  </script>
</body>
</html>
